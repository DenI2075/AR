<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Shiko në AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #f5f5f5; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      height: 100vh; 
      font-family: sans-serif; 
    }
    #label {
      padding: 20px 16px 8px;
      font-size: 14px;
      color: #888;
      text-align: center;
      letter-spacing: 0.3px;
    }
    model-viewer { 
      width: 100%; 
      height: 65vh; 
      background-color: #f5f5f5;
    }
    #ar-button {
      padding: 14px 28px;
      background: #ff6600;
      color: white;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div id="label">Rrotulloje me gisht për ta parë nga të gjitha anët</div>
  <model-viewer
    id="viewer"
    src="/orange.glb"
    ios-src="/orange.usdz"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    xr-environment>
    <button slot="ar-button" id="ar-button">
      ✨ Shiko në tryezën tënde
    </button>
  </model-viewer>
</body>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</html>
